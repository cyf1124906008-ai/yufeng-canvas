<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061321"/>
      <stop offset="0.52" stop-color="#0A2A2B"/>
      <stop offset="1" stop-color="#F4FAF8"/>
    </linearGradient>
    <linearGradient id="accent" x1="260" y1="120" x2="980" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22C55E"/>
      <stop offset="1" stop-color="#00A3FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="30" stdDeviation="35" flood-color="#001827" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1280" height="720" rx="44" fill="url(#bg)"/>
  <circle cx="250" cy="150" r="220" fill="#00A3FF" opacity="0.18"/>
  <circle cx="1000" cy="150" r="180" fill="#22C55E" opacity="0.16"/>
  <rect x="80" y="70" width="1120" height="580" rx="34" fill="white" fill-opacity="0.82" filter="url(#shadow)"/>
  <rect x="80" y="70" width="1120" height="72" rx="34" fill="#F8FAFC"/>
  <circle cx="128" cy="106" r="14" fill="#EF4444"/>
  <circle cx="166" cy="106" r="14" fill="#F59E0B"/>
  <circle cx="204" cy="106" r="14" fill="#22C55E"/>
  <rect x="945" y="94" width="74" height="24" rx="12" fill="#DCFCE7"/>
  <text x="1035" y="112" fill="#0F172A" font-family="Arial, sans-serif" font-size="16" font-weight="700">YUFENG Canvas</text>

  <g transform="translate(128 184)">
    <rect width="110" height="110" rx="28" fill="#061321"/>
    <path d="M29 31 L55 62 L82 31" stroke="#F8FAFC" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M55 62 L55 86" stroke="#F8FAFC" stroke-width="12" stroke-linecap="round"/>
    <path d="M36 80 H74" stroke="#27E8B8" stroke-width="6" stroke-linecap="round"/>
    <circle cx="80" cy="28" r="8" fill="#27E8B8"/>
  </g>

  <text x="128" y="350" fill="#0F172A" font-family="Arial, sans-serif" font-size="58" font-weight="900">Chat, Images and Video</text>
  <text x="128" y="414" fill="#0F172A" font-family="Arial, sans-serif" font-size="58" font-weight="900">on one local canvas.</text>
  <text x="128" y="466" fill="#475569" font-family="Arial, sans-serif" font-size="22">A desktop AI visual workflow app for DataEyes-compatible models.</text>
  <rect x="128" y="516" width="160" height="48" rx="24" fill="url(#accent)"/>
  <text x="165" y="547" fill="white" font-family="Arial, sans-serif" font-size="17" font-weight="800">Start creating</text>
  <rect x="306" y="516" width="152" height="48" rx="24" fill="white" stroke="#CBD5E1"/>
  <text x="343" y="547" fill="#0F172A" font-family="Arial, sans-serif" font-size="17" font-weight="800">Configure API</text>

  <g transform="translate(690 184)">
    <rect width="420" height="320" rx="26" fill="#0F172A"/>
    <rect x="24" y="24" width="372" height="52" rx="18" fill="#1E293B"/>
    <text x="48" y="57" fill="#E2E8F0" font-family="Arial, sans-serif" font-size="18" font-weight="700">Ask anything or build a workflow</text>
    <rect x="24" y="100" width="250" height="44" rx="18" fill="#DCFCE7"/>
    <text x="48" y="128" fill="#166534" font-family="Arial, sans-serif" font-size="16" font-weight="700">Help me plan a product video</text>
    <rect x="94" y="166" width="302" height="76" rx="22" fill="#E0F2FE"/>
    <text x="120" y="198" fill="#075985" font-family="Arial, sans-serif" font-size="16" font-weight="700">Create 6 shots, generate a key visual,</text>
    <text x="120" y="222" fill="#075985" font-family="Arial, sans-serif" font-size="16" font-weight="700">then turn it into a short video.</text>
    <rect x="24" y="268" width="372" height="28" rx="14" fill="#334155"/>
    <rect x="24" y="268" width="188" height="28" rx="14" fill="url(#accent)"/>
  </g>
